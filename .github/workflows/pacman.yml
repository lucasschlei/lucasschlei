name: Generate Pacman Contribution Graph

on:
  schedule: # Atualiza automaticamente a cada 24 horas
    - cron: "0 0 * * *" 
  workflow_dispatch: # Permite que você rode manualmente
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: lucasschlei
          outputs: |
            dist/pacman-contribution-graph.svg
            dist/pacman-contribution-graph-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
